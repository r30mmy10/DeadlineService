<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ — Deadline Service</title>
  <link rel="stylesheet" href="/css/site.css" />
</head>
<body onload="initAdminPage()">
  <div class="container container--wide">
    <header class="app-header">
      <div class="brand">
        <div class="brand-logo">DS</div>
        <div>
          <h1>Админ-панель</h1>
          <p id="adminStatus">Проверка доступа…</p>
        </div>
      </div>
      <nav class="nav-actions">
        <button class="btn-ghost" onclick="window.location.href='/tasks.html'">К задачам</button>
        <button class="btn-ghost" onclick="loadAdminData()">Обновить</button>
        <button class="btn-danger" onclick="logout()">Выйти</button>
      </nav>
    </header>

    <div class="card">
      <h2>Пользователи</h2>
      <p class="card-desc">Просмотр и блокировка аккаунтов</p>
      <div id="adminUsers"></div>
    </div>

    <div class="card">
      <h2>Все задачи</h2>
      <p class="card-desc">Задачи всех пользователей системы</p>
      <div id="adminTasks"></div>
    </div>

    <div class="card">
      <h2>Все уведомления</h2>
      <p class="card-desc">Сформированные Go-сервисом уведомления</p>
      <div id="adminNotifications"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
