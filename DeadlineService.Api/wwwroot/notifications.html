<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Уведомления — Deadline Service</title>
  <link rel="stylesheet" href="/css/site.css" />
</head>
<body onload="initNotificationsPage()">
  <div class="container">
    <header class="app-header">
      <div class="brand">
        <div class="brand-logo">DS</div>
        <div>
          <h1>Уведомления</h1>
          <p>История напоминаний о дедлайнах</p>
        </div>
      </div>
      <nav class="nav-actions">
        <button class="btn-ghost" onclick="window.location.href='/tasks.html'">Задачи</button>
        <button class="btn-ghost" onclick="loadNotifications()">Обновить</button>
        <button class="btn-danger" onclick="logout()">Выйти</button>
      </nav>
    </header>

    <div class="card">
      <h2>Мои уведомления</h2>
      <p class="card-desc">In-app записи и статусы отправки email</p>
      <div id="notificationsList"></div>
    </div>

    <div class="hint-box">
      Письма для проверки email-канала: <a href="http://localhost:8025" target="_blank" rel="noopener">Mailpit →</a>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
