<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мои задачи — Deadline Service</title>
  <link rel="stylesheet" href="/css/site.css" />
</head>
<body onload="initTasksPage()">
  <div class="container container--wide">
    <header class="app-header">
      <div class="brand">
        <div class="brand-logo">DS</div>
        <div>
          <h1>Мои задачи</h1>
          <p id="status" class="status-pill">Загрузка…</p>
        </div>
      </div>
      <nav class="nav-actions">
        <button id="adminPanelBtn" class="btn-ghost hidden" onclick="window.location.href='/admin.html'">Админ</button>
        <button class="btn-ghost" onclick="window.location.href='/notifications.html'">Уведомления</button>
        <button class="btn-ghost" onclick="loadTasks()">Обновить</button>
        <button class="btn-danger" onclick="logout()">Выйти</button>
      </nav>
    </header>

    <div class="card-grid">
      <div class="card">
        <h2>Новая задача</h2>
        <p class="card-desc">Укажите дедлайн и настройте напоминания</p>

        <label for="taskTitle">Название</label>
        <input id="taskTitle" type="text" placeholder="Например: Сдать отчёт" />

        <label for="taskDescription">Описание</label>
        <textarea id="taskDescription" placeholder="Детали задачи (необязательно)"></textarea>

        <div class="form-row">
          <div>
            <label for="taskDeadline">Дедлайн</label>
            <input id="taskDeadline" type="datetime-local" />
          </div>
          <div>
            <label for="taskPriority">Приоритет</label>
            <select id="taskPriority">
              <option value="High">Высокий</option>
              <option value="Medium" selected>Средний</option>
              <option value="Low">Низкий</option>
            </select>
          </div>
        </div>

        <div class="reminder-box">
          <h3>Напоминания</h3>
          <div class="form-row">
            <div>
              <label for="remindValue">За сколько</label>
              <input id="remindValue" type="number" min="1" value="1" />
            </div>
            <div>
              <label for="remindUnit">Единица</label>
              <select id="remindUnit">
                <option value="Minutes">Минут</option>
                <option value="Hours" selected>Часов</option>
                <option value="Days">Дней</option>
              </select>
            </div>
          </div>
          <div class="checkbox-row">
            <label><input id="notifyEmail" type="checkbox" checked /> Email</label>
            <label><input id="notifyInApp" type="checkbox" checked /> В приложении</label>
          </div>
        </div>

        <button class="btn-block" onclick="createTask()">Создать задачу</button>
      </div>

      <div class="card">
        <h2>Фильтр</h2>
        <p class="card-desc">Найдите задачи по статусу и сроку</p>

        <label for="filterStatus">Статус</label>
        <select id="filterStatus">
          <option value="">Все</option>
          <option value="Pending">Ожидает</option>
          <option value="InProgress">В работе</option>
          <option value="Done">Готово</option>
        </select>

        <div class="form-row">
          <div>
            <label for="filterDeadlineFrom">Дедлайн от</label>
            <input id="filterDeadlineFrom" type="datetime-local" />
          </div>
          <div>
            <label for="filterDeadlineTo">Дедлайн до</label>
            <input id="filterDeadlineTo" type="datetime-local" />
          </div>
        </div>

        <label class="checkbox-row">
          <input id="filterOverdue" type="checkbox" />
          Только просроченные
        </label>

        <div class="btn-group">
          <button onclick="loadTasks()">Применить</button>
          <button class="btn-ghost" onclick="resetTaskFilters()">Сбросить</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Список задач</h2>
      <p class="card-desc">Все ваши активные и завершённые задачи</p>
      <div id="tasks"></div>
    </div>

    <div class="hint-box">
      Email-уведомления в учебном режиме: <a href="http://localhost:8025" target="_blank" rel="noopener">открыть Mailpit</a>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
