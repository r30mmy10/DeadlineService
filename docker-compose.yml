version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: deadline-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: deadline_service_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  go-notifier:
    build: ./services/go-notifier
    container_name: deadline-notifier
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=mysecretpassword
      - DB_NAME=deadline_service_db
      - DB_SSLMODE=disable
      - WORKER_INTERVAL=60
    volumes:
      - ./services/go-notifier/config.yaml:/root/config.yaml
    restart: unless-stopped

volumes:
  postgres_data: