<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — Deadline Service</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f6f8;
      margin: 0;
      padding: 40px 16px;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 40px;
    }

    .subtitle {
      color: #555;
      margin-bottom: 24px;
    }

    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.04);
    }

    h2 {
      margin-top: 0;
      margin-bottom: 16px;
    }

    input, button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      cursor: pointer;
      background: #111827;
      color: white;
      border: none;
    }

    button:hover {
      background: #1f2937;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Deadline Service</h1>
    <div class="subtitle">Вход и регистрация</div>

    <div class="card">
      <h2>Регистрация</h2>
      <input id="registerEmail" type="email" placeholder="Email" />
      <input id="registerPassword" type="password" placeholder="Пароль" />
      <button onclick="register()">Зарегистрироваться</button>
    </div>

    <div class="card">
      <h2>Вход</h2>
      <input id="loginEmail" type="email" placeholder="Email" />
      <input id="loginPassword" type="password" placeholder="Пароль" />
      <button onclick="login()">Войти</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
